name: Trigger Daily Email Report

on:
  schedule:
    # 23:30 UTC is 05:00 AM IST (Indian Standard Time)
    - cron: '30 23 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  trigger-report:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the daily report API endpoint
        run: |
          curl -X POST https://api.toolisiya.com/email-reports/send-daily-report \
          -H "Content-Type: application/json" \
          -H "User-Agent: GitHub-Actions-Cron" \
          --fail --retry 5 --retry-delay 15 --retry-max-time 120 --retry-connrefused
